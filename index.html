<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>부산라이온스클럽 디지털 회원수첩</title>
<style>
:root{
  --navy:#1a3a6b;--navy-d:#142d52;--gold:#f0c040;--gold-l:#f7e6ad;--gold-d:#b88a1e;
  --paper:#f4efe3;--paper-d:#ebe3d2;--card:#fffdf8;--ink:#23262b;--muted:#6a6d75;--line:#e3dccb;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Noto Sans KR',sans-serif;background:#1a1e25;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
#app{width:min(412px,100vw);height:min(892px,100vh);background:var(--paper);border-radius:min(46px,0px);overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 11px #0c0f14}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--paper);animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* 공통 */
.appbar{background:var(--navy);padding:14px 16px;flex-shrink:0;display:flex;align-items:center;gap:10px}
.appbar-back{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.12);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.appbar-title{color:#fff;font-size:17px;font-weight:700;flex:1}
.appbar-sub{color:rgba(255,255,255,.65);font-size:12px;margin-top:1px}
.section-label{padding:14px 20px 6px;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;margin:0 16px 14px;overflow:hidden}
.row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line);gap:12px}
.row:last-child{border-bottom:none}
.row-label{font-size:12px;color:var(--muted);margin-bottom:2px}
.row-val{font-size:14px;color:var(--ink);font-weight:500;word-break:keep-all;line-height:1.4}
.btn-primary{width:100%;min-height:56px;border-radius:14px;background:var(--navy);color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gold{background:var(--gold);color:var(--navy-d)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-exec{background:rgba(240,192,64,.18);color:var(--gold-d)}
.badge-status{background:rgba(26,58,107,.1);color:var(--navy)}

/* 탭바 */
#tabbar{background:#fff;border-top:1px solid var(--line);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.tab-btn{flex:1;padding:10px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--muted);transition:color .15s}
.tab-btn.active{color:var(--navy)}
.tab-btn svg{transition:transform .15s}
.tab-btn.active svg{transform:scale(1.12)}

/* 표지 */
#cover{background:radial-gradient(130% 90% at 50% 8%,#21477f,#0d1f3d);color:#fff;align-items:center;justify-content:space-between;padding:0;text-align:center;position:absolute;inset:0;display:flex;flex-direction:column;z-index:10}
.cover-frame{position:absolute;inset:16px;border:1.5px solid rgba(240,192,64,.5);border-radius:22px;pointer-events:none}
.cover-frame2{position:absolute;inset:22px;border:1px solid rgba(240,192,64,.22);border-radius:17px;pointer-events:none}
.crest{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#d4a017);display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:900;color:var(--navy-d);box-shadow:0 0 0 6px rgba(240,192,64,.25),0 8px 28px rgba(0,0,0,.3);letter-spacing:-2px}

/* 회원 행 */
.member-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;gap:13px;background:none;width:100%;text-align:left;border:none;border-bottom:1px solid var(--line)}
.member-row:active{background:var(--paper-d)}
.avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#2a4d8f,#1a3060);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.avatar.gold{background:linear-gradient(135deg,var(--gold),#d4a017);color:var(--navy-d)}
.member-name{font-size:17px;font-weight:700;color:var(--ink)}
.member-sub{font-size:13px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}

/* 인덱스 사이드바 */
#index-rail{position:absolute;right:0;top:0;bottom:0;width:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.idx-btn{width:22px;height:20px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:700;color:var(--navy);border-radius:5px;transition:background .1s}
.idx-btn:active{background:var(--gold);color:var(--navy-d)}
.idx-btn.disabled{color:#ccc;cursor:default}

/* 회원카드 */
.card-hero{background:linear-gradient(135deg,#1c3e72,#0e2140);padding:24px 20px 20px;color:#fff;display:flex;align-items:center;gap:16px}
.avatar-lg{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#d4a017);color:var(--navy-d);font-size:24px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-name{font-size:24px;font-weight:800;letter-spacing:.5px}
.card-rom{font-size:12px;color:rgba(247,230,173,.8);margin-top:4px}
.card-role-badge{display:inline-block;padding:4px 12px;border-radius:20px;background:rgba(240,192,64,.2);border:1px solid rgba(240,192,64,.4);font-size:13px;font-weight:700;color:var(--gold);margin-top:8px}

/* 집행부 */
.exec-chief{background:var(--card);border:2px solid var(--navy);border-radius:16px;margin:0 16px 10px;padding:16px;display:flex;align-items:center;gap:14px}
.exec-row{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:0 16px 8px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px 8px}
.exec-mini{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer}
.exec-mini-role{font-size:11px;color:var(--muted);margin-bottom:3px}
.exec-mini-name{font-size:15px;font-weight:700;color:var(--ink)}

/* 헌장 */
.tab-row{display:flex;border-bottom:2px solid var(--line);background:var(--card);flex-shrink:0;overflow-x:auto}
.tab-row::-webkit-scrollbar{display:none}
.reg-tab{padding:12px 16px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.reg-tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.reg-content{padding:16px 20px;line-height:1.85;font-size:14px;color:var(--ink)}
.reg-h1{font-size:18px;font-weight:800;color:var(--navy);margin:20px 0 8px;font-family:Georgia,serif}
.reg-h2{font-size:15px;font-weight:700;color:var(--navy-d);margin:14px 0 6px}
.search-box{margin:10px 16px;padding:10px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);font-size:15px;width:calc(100% - 32px);outline:none;color:var(--ink)}
.search-box:focus{border-color:var(--navy)}
.highlight{background:#fff3c4;border-radius:2px}

/* 연혁 */
.year-card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:0 16px 10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.year-card.current{border:2px solid var(--navy)}
.year-badge-current{background:var(--navy);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.year-badge-past{background:var(--paper-d);color:var(--muted);padding:3px 10px;border-radius:20px;font-size:11px}

/* 토스트 */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(14,33,64,.94);color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:600;z-index:999;display:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
</style>
</head>

const MEMBERS_CLEAN = MEMBERS.filter((m,i,a) => m.name && m.f && a.findIndex(x=>x.name===m.name)===i);

const KA = ['가','나','다','라','마','바','사','아','자','차','카','타','파','하'];

function getInitial(name) {
  if (!name) return '?';
  const c = name.charCodeAt(0);
  if (c < 0xAC00 || c > 0xD7A3) return name[0];
  const idx = Math.floor((c - 0xAC00) / 588);
  return KA[['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'].indexOf(
    ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][idx]
  )] || name[0];
}

// ===== 유틸 =====
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display='none', 2200);
}

function avatar(name, gold=false, size=48) {
  const ch = name ? name[0] : '?';
  const bg = gold ? 'linear-gradient(135deg,var(--gold),#d4a017)' : 'linear-gradient(135deg,#2a4d8f,#1a3060)';
  const color = gold ? 'var(--navy-d)' : '#fff';
  const fs = Math.round(size * 0.35);
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};color:${color};display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:800;flex-shrink:0">${ch}</div>`;
}

// ===== 네비게이션 =====
let currentTab = 'home';

function openApp() {
  document.getElementById('cover').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'flex';
  showTab('home');
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  const screens = document.getElementById('screens');
  screens.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'screen';
  div.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column';
  screens.appendChild(div);
  if (tab==='home') renderHome(div);
  else if (tab==='members') renderMembers(div);
  else if (tab==='exec') renderExec(div);
  else if (tab==='rules') renderRules(div);
  else if (tab==='history') renderHistory(div);
}

function showMember(id) {
  const m = MEMBERS_CLEAN.find(x => x.id === id);
  if (!m) return;
  const screens = document.getElementById('screens');
  const div = document.createElement('div');
  div.className = 'screen';
  div.style.cssText = 'position:absolute;inset:0;z-index:10;display:flex;flex-direction:column';
  screens.appendChild(div);
  renderMemberCard(div, m);
}

function renderMembers(el) {
  const sorted = [...MEMBERS_CLEAN].sort((a,b) => {
    const ia = KA.indexOf(getInitial(a.name));
    const ib = KA.indexOf(getInitial(b.name));
    if (ia !== ib) return (ia<0?99:ia)-(ib<0?99:ib);
    return a.name.localeCompare(b.name,'ko');
  });

  el.innerHTML = `
  <div class="appbar">
    <div>
      <div class="appbar-title">회원 명부</div>
      <div class="appbar-sub">정회원 ${MEMBERS_CLEAN.length}명</div>
    </div>
  </div>
  <div style="padding:12px 16px 8px;background:var(--paper);flex-shrink:0">
    <input id="member-search" class="search-box" placeholder="이름 · 직책 · 회사 검색" oninput="filterMembers(this.value)" autocomplete="off"/>
  </div>
  <div style="flex:1;display:flex;min-height:0;position:relative">
    <div id="member-list" class="scroll" style="flex:1;padding-bottom:20px;padding-right:28px"></div>
    <div id="index-rail" style="position:absolute;right:0;top:0;bottom:0;width:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px"></div>
  </div>`;

  window._membersSorted = sorted;
  renderMemberList(sorted);
  buildIndexRail(sorted);
}

function renderMemberList(list) {
  const container = document.getElementById('member-list');
  if (!container) return;

  // 그룹핑
  const groups = {};
  list.forEach(m => {
    const k = getInitial(m.name);
    (groups[k] = groups[k]||[]).push(m);
  });

  let html = '';
  KA.forEach(k => {
    if (!groups[k]) return;
    html += `<div id="group-${k}" style="scroll-margin-top:8px">
      <div style="position:sticky;top:0;z-index:1;background:var(--paper-d);padding:5px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)">
        <span style="font-size:15px;font-weight:800;color:var(--navy)">${k}</span>
        <span style="font-size:12px;color:var(--muted)">${groups[k].length}</span>
      </div>`;
    groups[k].forEach(m => {
      html += `<button onclick="showMember(${m.id})" style="width:100%;display:flex;align-items:center;padding:11px 14px;gap:12px;text-align:left;border:none;border-bottom:1px solid var(--line);background:none;cursor:pointer">
        ${avatar(m.name, m.id===1, 46)}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:17px;font-weight:700;color:var(--ink)">${m.name}</span>
            ${m.group==='집행부'?`<span class="badge badge-exec">${m.role}</span>`:''}
          </div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.status||'회원'}${m.co?' · '+m.co.split(' · ')[0]:''}</div>
        </div>
        <div style="flex-shrink:0;text-align:right">
          <div style="font-size:11px;color:var(--muted)">${m.j} 입회</div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="margin-top:3px"><path d="M9 5l7 7-7 7" stroke="#bbb" stroke-width="2.2" stroke-linecap="round"/></svg>
        </div>
      </button>`;
    });
    html += `</div>`;
  });

  if (!html) html = `<div style="text-align:center;color:var(--muted);margin-top:60px;font-size:16px">검색 결과가 없습니다</div>`;
  container.innerHTML = html;
}

function buildIndexRail(list) {
  const rail = document.getElementById('index-rail');
  if (!rail) return;
  const present = new Set(list.map(m => getInitial(m.name)));
  rail.innerHTML = KA.map(k => `
    <button class="idx-btn${!present.has(k)?' disabled':''}" onclick="${present.has(k)?`jumpToGroup('${k}')`:'void 0'}">${k}</button>
  `).join('');
}

function jumpToGroup(k) {
  const el = document.getElementById('group-'+k);
  const list = document.getElementById('member-list');
  if (el && list) list.scrollTo({top: el.offsetTop - 8, behavior:'smooth'});
}

function filterMembers(q) {
  const kw = q.trim().toLowerCase();
  const filtered = kw
    ? window._membersSorted.filter(m => (m.name+m.role+m.co+m.status+(m.rom||'')).toLowerCase().includes(kw))
    : window._membersSorted;
  renderMemberList(filtered);
  if (!kw) buildIndexRail(filtered);
  else document.getElementById('index-rail').innerHTML = '';
}

let currentRegTab = '윤리강령';

function renderRules(el) {
  const tabs = Object.keys(REGS);
  el.innerHTML = `
  <div class="appbar">
    <div>
      <div class="appbar-title">헌장 · 규정</div>
      <div class="appbar-sub">부산라이온스클럽</div>
    </div>
  </div>
  <input id="reg-search" class="search-box" placeholder="규정 내 검색..." oninput="searchReg(this.value)" autocomplete="off" style="margin-top:10px"/>
  <div class="tab-row">
    ${tabs.map(t=>`<button class="reg-tab${t===currentRegTab?' active':''}" onclick="switchRegTab('${t}')" id="rtab-${t.replace(/[^a-zA-Z가-힣]/g,'_')}">${t}</button>`).join('')}
  </div>
  <div id="reg-body" class="scroll">${REGS[currentRegTab]}</div>`;
}

function switchRegTab(t) {
  currentRegTab = t;
  document.querySelectorAll('.reg-tab').forEach(b => b.classList.remove('active'));
  const safe = t.replace(/[^a-zA-Z가-힣]/g,'_');
  const btn = document.getElementById('rtab-'+safe);
  if (btn) btn.classList.add('active');
  document.getElementById('reg-body').innerHTML = REGS[t];
  document.getElementById('reg-search').value = '';
}

function searchReg(q) {
  const kw = q.trim();
  const body = document.getElementById('reg-body');
  if (!kw) { body.innerHTML = REGS[currentRegTab]; return; }
  let html = REGS[currentRegTab];
  const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  body.innerHTML = html.replace(re, m => `<mark class="highlight">${m}</mark>`);
}
